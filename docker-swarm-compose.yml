version: "3.8"

networks:
  hadoop-net:
    driver: overlay

services:
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    hostname: namenode
    networks:
      - hadoop-net
    ports:
      - 9870:9870
      - 9000:9000
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
    environment:
      CLUSTER_NAME: test
    env_file:
      - ./hadoop.env
    deploy:
      endpoint_mode: dnsrr
      placement:
        constraints:
          - node.role == manager

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    hostname: datanode
    networks:
      - hadoop-net
    volumes:
      - hadoop_datanode:/hadoop/dfs/data
    env_file:
      - ./hadoop.env
    environment:
      SERVICE_PRECONDITION: namenode:9870
    deploy:
      endpoint_mode: dnsrr
      replicas: 2
      placement:
        constraints:
          - node.role == worker

  resourcemanager:
    image: bde2020/hadoop-resourcemanager:2.0.0-hadoop3.2.1-java8
    hostname: resourcemanager
    networks:
      - hadoop-net
    env_file:
      - ./hadoop.env
    environment:
      SERVICE_PRECONDITION: namenode:9000 namenode:9870 datanode:9864
    deploy:
      endpoint_mode: dnsrr
      placement:
        constraints:
          - node.role == manager

  nodemanager:
    image: bde2020/hadoop-nodemanager:2.0.0-hadoop3.2.1-java8
    hostname: nodemanager
    networks:
      - hadoop-net
    env_file:
      - ./hadoop.env
    environment:
      SERVICE_PRECONDITION: namenode:9000 namenode:9870 datanode:9864 resourcemanager:8088
    deploy:
      endpoint_mode: dnsrr
      replicas: 2
      placement:
        constraints:
          - node.role == worker

  historyserver:
    image: bde2020/hadoop-historyserver:2.0.0-hadoop3.2.1-java8
    hostname: historyserver
    networks:
      - hadoop-net
    volumes:
      - hadoop_historyserver:/hadoop/yarn/timeline
    env_file:
      - ./hadoop.env
    environment:
      SERVICE_PRECONDITION: namenode:9000 namenode:9870 datanode:9864 resourcemanager:8088
    deploy:
      endpoint_mode: dnsrr
      placement:
        constraints:
          - node.role == manager

volumes:
  hadoop_namenode:
  hadoop_datanode:
  hadoop_historyserver: